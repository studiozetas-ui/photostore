function cleanPhotoMap(){
  // Recolectar todos los IDs válidos de alumnos
  var validIds = {};
  ST.schools.forEach(function(sc){
    (sc.levels||[]).forEach(function(lv){
      (lv.grades||[]).forEach(function(gr){
        (gr.students||[]).forEach(function(st){
          validIds[st.id] = true;
        });
      });
    });
  });
  // Eliminar del photoMap cualquier ID que no corresponda a un alumno válido
  var cleaned = 0;
  Object.keys(ST.photoMap).forEach(function(id){
    if(!validIds[id]){
      delete ST.photoMap[id];
      cleaned++;
    }
  });
  if(cleaned > 0){
    console.log('cleanPhotoMap: eliminados '+cleaned+' registros huerfanos');
    saveData();
  }
}

function copyLinkIdx(i){
  var url = window._shareLinks && window._shareLinks[i];
  if(!url) return;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){alert('Link copiado!');});
  } else {
    var ta=document.createElement('textarea');
    ta.value=url;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    alert('Link copiado!');
  }
}
function shareWA(i){
  var url = window._shareLinks && window._shareLinks[i];
  var sc = ST.schools[i];

  var msg='Hola! Te mando el link para comprar las fotos de '+sc.name+': '+url;
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

function normalizarYCargar(ev, si, li, gi){
  var file=ev.target.files[0]; if(!file) return;
  var sc=ST.schools[si], lv=sc&&(sc.levels||[])[li], gr=lv&&(lv.grades||[])[gi];
  if(!gr){alert('Grado no encontrado.');return;}

  if(!file.type.startsWith('image/')){
    readFile(file,function(rows){
      if(!rows.length){alert('Archivo vacio.');return;}
      var hdr=rows[0]||[], hi=hdr.map(function(x){return String(x||'').toLowerCase();});

// Array de grados para exportar/reimportar
function getGrados(){
  var grados = [];
  ST.schools.forEach(function(sc){
    (sc.levels||[]).forEach(function(lv){
      (lv.grades||[]).forEach(function(gr){
        if((gr.students||[]).length > 0) grados.push({sc:sc,lv:lv,gr:gr});
      });
    });
  });
  return grados;
}

function exportarGrado(gi){
  var grados = getGrados();
  var g = grados[gi]; if(!g) return;
  var soloRetrato = g.sc.formato === 'solo_retrato';
  var wb = XLSX.utils.book_new();
  var header = soloRetrato ? ['N','APELLIDO Y NOMBRE','N_RETRATO'] : ['N','APELLIDO Y NOMBRE','N_RETRATO','N_CON_SENO'];
  var data = [header];
  (g.gr.students||[]).forEach(function(st,i){
    var pm = ST.photoMap[st.id]||{};
    var row = soloRetrato ? [i+1, st.name, pm.retrato||''] : [i+1, st.name, pm.retrato||'', pm.maestra||''];
    data.push(row);
  });
  var ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = soloRetrato ? [{wch:5},{wch:40},{wch:13}] : [{wch:5},{wch:40},{wch:13},{wch:13}];
  XLSX.utils.book_append_sheet(wb, ws, 'Fotos');
  var nombre = (g.gr.name + '_' + g.lv.name).replace(/[^a-zA-Z0-9]/g,'_').slice(0,30);
  XLSX.writeFile(wb, 'FOTOS_' + nombre + '.xlsx');
}

function reimportarGrado(ev, gi){
  var file = ev.target.files[0]; if(!file) return;
  ev.target.value = '';
  var grados = getGrados();
  var g = grados[gi]; if(!g) return;
  readFile(file, function(rows){
    if(!rows.length){ alert('Archivo vacio.'); return; }
    var hdr = rows[0].map(function(x){ return String(x||'').toLowerCase(); });
    var ni = hdr.findIndex(function(h){ return h.includes('nombre')||h.includes('alumno'); });
    var ri = hdr.findIndex(function(h){ return h.includes('retrato'); });
    var mi = hdr.findIndex(function(h){ return h.includes('seno')||h.includes('maestra'); });
    if(ni<0){ alert('No encontre columna de nombres.'); return; }
    var n=0;
    for(var i=1;i<rows.length;i++){
      var nombre = String(rows[i][ni]||'').trim().toLowerCase(); if(!nombre) continue;
      var st = (g.gr.students||[]).find(function(a){
        return a.name.toLowerCase()===nombre || a.name.toLowerCase().includes(nombre) || nombre.includes(a.name.toLowerCase());
      });
      if(!st) continue;
      var pm = ST.photoMap[st.id]||{};
      if(ri>=0 && rows[i][ri]) pm.retrato = String(rows[i][ri]).trim().replace(/\D/g,'');
      if(mi>=0 && rows[i][mi]) pm.maestra = String(rows[i][mi]).trim().replace(/\D/g,'');
      ST.photoMap[st.id] = pm; n++;
    }
    saveData(); alert('Actualizados ' + n + ' alumnos con numeros de foto.'); R();
  });
}
function savePrefix(){ST.cfg.photoPrefix=(gel('prefix-inp')||{}).value||'SOC_';saveData();alert('Prefijo: '+ST.cfg.photoPrefix);}
function setPMev(el){var pm=ST.photoMap[el.getAttribute('data-stid')]||{};pm[el.getAttribute('data-field')]=el.value.trim().replace(/\D/g,'');ST.photoMap[el.getAttribute('data-stid')]=pm;saveData();}

function oDel(idx){

  ST.orders=ST.orders.filter(function(x){return x.id!==o.id;});
  saveData();
  alert('Pedido de '+o.studentName+' eliminado.');
  R();
}
function oPay(idx){
  var all=[].concat(ST.orders).sort(function(a,b){return b.createdAt-a.createdAt;});
  var o=all[idx];if(!o)return;
  var f=ST.orders.find(function(x){return x.id===o.id;});
  if(f){f.status='paid';saveData();if(f.phone)sendWA(f);R();}
}

function confirmarEfectivo(){
  var gradoIdx=parseInt((document.getElementById('em_grado')||{}).value);
  if(isNaN(gradoIdx)||!window._cashOpts[gradoIdx]){alert('Elegi un grado.');return;}
  var op=window._cashOpts[gradoIdx];
  var sc=ST.schools.find(function(s){return s.id===op.sc;});
  var lv=sc&&(sc.levels||[]).find(function(l){return l.id===op.lv;});
  var gr=lv&&(lv.grades||[]).find(function(g){return g.id===op.gr;});
  if(!gr){alert('Error.');return;}
  var base=ST.products.find(function(p){return p.isBase;});
  var extras=ST.products.filter(function(p){return !p.isBase;});
  var lista=document.getElementById('em_lista');
  var checks=lista.querySelectorAll('input[type=checkbox]:checked');
  if(!checks.length){alert('Marca al menos un alumno.');return;}
  var registrados=0;
  checks.forEach(function(chk){
    var i=parseInt(chk.getAttribute('data-st'));
    var st=gr.students[i]; if(!st) return;
    var qty=parseInt((lista.querySelector('input[data-qty="'+i+'"]')||{}).value)||1;
    var items=[];
    if(base) items.push({name:base.name,qty:qty,price:base.price});
    extras.forEach(function(ex,ei){
      var extQty=parseInt((lista.querySelector('input[data-ext="'+ei+'"][data-st="'+i+'"]')||{}).value)||0;
      if(extQty>0) items.push({name:ex.name,qty:extQty,price:ex.price});
    });
    var total=items.reduce(function(a,it){return a+it.price*it.qty;},0);
    ST.orders.push({id:uid(),studentId:st.id,studentName:st.name,schoolName:op.scName,levelName:op.lvName,gradeName:op.grName,phone:'',status:'paid',paymentMethod:'cash',total:total,items:items,createdAt:Date.now()});
    registrados++;
  });
  saveData();
  cerrarOvEfectivo();
  R();
  alert('Registrados '+registrados+' pagos en efectivo en '+op.grName+'.');
}

// ─── WHATSAPP ───
function numWA(phone){var num=String(phone||'').replace(/\D/g,'');if(!num)return null;if(num.startsWith('0'))num=num.slice(1);if(!num.startsWith('54'))num='54'+num;if(num.startsWith('54')&&!num.startsWith('549'))num='549'+num.slice(2);return num;}
async function sendWA(order){
  var msg='Foto Escolar Studio Zeta\n'+order.studentName+'\n'+order.gradeName+'\nTotal: '+fmt(order.total)+'\nPAGADO\nGracias!';
  var num=numWA(order.phone);if(!num)return;
  var body=new URLSearchParams({token:ST.cfg.umToken,to:'+'+num,body:msg,priority:'10'});
  try{await fetch('https://api.ultramsg.com/'+ST.cfg.umInst+'/messages/chat',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()});}
  catch(e){console.error('WA:',e);}
}

// ─── PDF ───
function doPDF(){
  var paid=ST.orders.filter(function(o){return o.status==='paid';});
  if(!paid.length){alert('Sin pedidos pagados.');return;}

  var jsPDF=window.jspdf&&window.jspdf.jsPDF;
  if(!jsPDF){alert('Libreria PDF no disponible. Verificá internet y recargá la pagina.');return;}

  var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  var pw=210; var ph=297;
  var margin=10;
  var tot=paid.reduce(function(a,o){return a+o.total;},0);

  // Header azul
  doc.setFillColor(26,42,74);
  doc.rect(0,0,pw,22,'F');
  doc.setFontSize(15);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
  doc.text('Studio Zeta - Planilla de Produccion',pw/2,10,{align:'center'});
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text(new Date().toLocaleString('es-AR')+' | '+paid.length+' pedidos | Total: $'+Math.round(tot).toLocaleString('es-AR'),pw/2,17,{align:'center'});

  // Calcular altura de fila para que entren todos en A4
  var tableStart=26;
  var tableEnd=ph-margin;
  var available=tableEnd-tableStart-8; // 8 = header row
  var rowH=Math.min(8, Math.floor(available/paid.length));
  rowH=Math.max(5,rowH);

  // Anchos de columna (total = pw - 2*margin = 190mm)
  var cols=[
    {h:'#',      w:8,  x:margin},
    {h:'Alumno', w:62, x:margin+8},
    {h:'Grado',  w:30, x:margin+70},
    {h:'Carp',   w:12, x:margin+100},
    {h:'Retrato',w:22, x:margin+112},
    {h:'Con Seno',w:22,x:margin+134},
    {h:'Total',  w:24, x:margin+156},
    {h:'Canal',  w:14, x:margin+180}
  ];

  // Header tabla
  var y=tableStart;
  doc.setFillColor(44,74,124);
  doc.rect(margin,y,pw-margin*2,8,'F');
  doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
  cols.forEach(function(col){doc.text(col.h,col.x+1,y+5.5);});
  y+=8;

  // Filas
  doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);
  paid.forEach(function(o,i){
    if(y+rowH>ph-margin-10){
      doc.addPage();
      y=margin;
    }
    var pm=ST.photoMap[o.studentId]||{};
    var bi=(o.items||[]).find(function(it){return ST.products.find(function(p){return p.name===it.name&&p.isBase;});});
    var bq=bi?bi.qty:1;
    // Fondo alternado
    if(i%2===0){doc.setFillColor(245,247,250);doc.rect(margin,y,pw-margin*2,rowH,'F');}
    // Borde
    doc.setDrawColor(200,200,200);
    doc.rect(margin,y,pw-margin*2,rowH,'S');
    var fs=Math.min(7.5, rowH*0.75);
    doc.setFontSize(fs);
    var ty=y+rowH*0.65;
    doc.text(String(i+1),cols[0].x+1,ty);
    doc.text(String(o.studentName||'').slice(0,28),cols[1].x+1,ty);
    doc.text(String(o.gradeName||'').slice(0,14),cols[2].x+1,ty);
    doc.text('x'+bq,cols[3].x+1,ty);
    doc.text(String(pm.retrato||'-'),cols[4].x+1,ty);
    doc.text(String(pm.maestra||'-'),cols[5].x+1,ty);
    doc.text('$'+Math.round(o.total).toLocaleString('es-AR'),cols[6].x+1,ty);
    doc.text(o.paymentMethod==='cash'?'Ef':'MP',cols[7].x+1,ty);
    y+=rowH;
  });

  // Footer total
  doc.setFillColor(26,42,74);
  doc.rect(margin,y+1,pw-margin*2,9,'F');
  doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);doc.setFontSize(9);
  doc.text('TOTAL COBRADO: $'+Math.round(tot).toLocaleString('es-AR'),pw/2,y+7,{align:'center'});

  // Descargar con Blob + a.click() - el mismo truco que el BAT
  var pdfBlob=doc.output('blob');
  var url=URL.createObjectURL(pdfBlob);
  var a=document.createElement('a');
  a.href=url;
  a.download='planilla_StudioZeta_'+new Date().toISOString().slice(0,10)+'.pdf';
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},3000);
}

    html+='</tr></thead><tbody>';

    gr.orders.forEach(function(o,i){
      var pm=ST.photoMap[o.studentId]||{};
      var bi=(o.items||[]).find(function(it){return ST.products.find(function(p){return p.name===it.name&&p.isBase;});});
      var bq=bi?bi.qty:1;
      // Extras: todo lo que no es base
      var exItems=(o.items||[]).filter(function(it){return !ST.products.find(function(p){return p.name===it.name&&p.isBase;});});
      var exStr=exItems.length?exItems.map(function(it){return 'x'+it.qty;}).join(' '):'—';
      html+='<tr>';
      html+='<td style="color:#64748b">'+(i+1)+'</td>';
      html+='<td>'+esc(o.studentName)+'</td>';
      html+='<td><strong style="color:'+(bq>1?'#fbbf24':'#34d399')+'">x'+bq+'</strong></td>';
      html+='<td style="color:#f472b6;font-weight:700">'+exStr+'</td>';
      html+='<td style="font-family:monospace;color:#6ee7b7;font-size:11px">'+(pm.retrato||'—')+'</td>';

      html+='<td><strong>'+fmt(o.total)+'</strong></td>';
      html+='<td>'+(o.paymentMethod==='cash'?'💵':'💳')+'</td>';
      html+='</tr>';
    });
    html+='<tr class="td-foot"><td colspan="5" style="text-align:right">TOTAL:</td><td colspan="3" style="color:#34d399">'+fmt(tot)+'</td></tr>';
    html+='</tbody></table></div></div>';
  });
  html+='</div>';
  return html;
}

// ─── BAT ───
function doBAT(){
  var paid=ST.orders.filter(function(o){return o.status==='paid';});
  if(!paid.length){alert('Sin pedidos pagados.');return;}
  var pfx=ST.cfg.photoPrefix||'SOC_';

  // Agrupar por grado
  var byGrade={};
  paid.forEach(function(o){
    var gk=o.gradeName||'GRADO';
    if(!byGrade[gk])byGrade[gk]={orders:[]};
    byGrade[gk].orders.push(o);
  });

  // Construir BAT — sin chcp, sin caracteres especiales, maxima compatibilidad
  var bat='@echo off\r\n';
  bat+='set ORIGEN=%~dp0\r\n';
  bat+='\r\n';

  Object.keys(byGrade).forEach(function(gk){
    var grp=byGrade[gk];

    // Contar carpetas totales
    var tc=grp.orders.reduce(function(a,o){
      var bi=(o.items||[]).find(function(it){return ST.products.find(function(p){return p.name===it.name&&p.isBase;});});
      return a+(bi?bi.qty:0);
    },0);

    // Contar copias 20x28
    var t2028=0;
    grp.orders.forEach(function(o){
      var bi=(o.items||[]).find(function(it){return ST.products.find(function(p){return p.name===it.name&&p.isBase;});});
      var bq=bi?bi.qty:0;
      t2028+=bq*2;
      (o.items||[]).forEach(function(item){
        if(ST.products.find(function(p){return p.name===item.name&&!p.isBase&&!p.isCanvas;}))
          t2028+=item.qty;
      });
    });
    t2028+=tc;

    var carpeta='COPIAR_20X28_MATE_'+t2028;

    bat+='mkdir "'+carpeta+'" 2>nul\r\n';
    bat+='\r\n';

    // Copiar fotos de cada alumno
    grp.orders.forEach(function(o){
      var pm=ST.photoMap[o.studentId]||{};
      if(!pm.retrato&&!pm.maestra) return;
      var apn=safeName(o.studentName||'ALUMNO');
      var bi=(o.items||[]).find(function(it){return ST.products.find(function(p){return p.name===it.name&&p.isBase;});});
      var bq=bi?bi.qty:1;
      var er=0;
      (o.items||[]).forEach(function(item){
        if(ST.products.find(function(p){return p.name===item.name&&!p.isBase&&!p.isCanvas;}))
          er+=item.qty;
      });
      var tr=bq+er;

      if(pm.retrato){
        var pr=tr>1?'X'+tr+'_':'';
        bat+='copy "%ORIGEN%'+pfx+pm.retrato+'.JPG" "'+carpeta+'\\'+pr+apn+'_'+pfx+pm.retrato+'.JPG"\r\n';
      }
      if(pm.maestra){
        var pm2=bq>1?'X'+bq+'_':'';
        bat+='copy "%ORIGEN%'+pfx+pm.maestra+'.JPG" "'+carpeta+'\\'+pm2+apn+'_'+pfx+pm.maestra+'.JPG"\r\n';
      }

    });

    // GRUPAL — for loop simple, sin variables intermedias
    bat+='\r\n';
    bat+='for %%G in ("%ORIGEN%*GRUPAL*") do copy "%%G" "'+carpeta+'\\X'+tc+'_%%~nxG"\r\n';
    bat+='\r\n';
  });

  bat+='echo Listo\r\n';
  bat+='pause\r\n';

  var blob=new Blob([bat],{type:'text/plain'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='PEDIDO.bat';
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(a.href);},3000);
  alert('PEDIDO.bat generado.\nCopiar a la carpeta de fotos originales y ejecutar con doble clic.');
}

function checkMP(){
  var p=new URLSearchParams(window.location.search);

  if(p.get('status')==='success'){
    var oid=p.get('order');
    var o=ST.orders.find(function(o){return o.id===oid;});
    if(o&&o.status!=='paid'){o.status='paid';saveData();sendWA(o);}
    history.replaceState({},'',window.location.pathname);
    ST.view='store'; ST.step=1; return;
  }

  if(p.get('admin')==='1'){
    ST.view='admin'; return;
  }

  if(p.get('colegio')){
    var scId=p.get('colegio');
    var sc=ST.schools.find(function(s){return s.id===scId;});
    if(sc){
      ST.sel.school=sc.id;
      // Si hay un solo colegio en el link, ir directo a la tienda
      ST.view='store'; ST.step=1;
    } else {
      ST.view='landing';
    }
    return;
  }

  // Sin parámetros → landing
  ST.view='landing';
}

document.addEventListener('click', function(e){
  var btn = e.target.closest('[data-a]');

  var a = btn.getAttribute('data-a');
  var i = parseInt(btn.getAttribute('data-i'), 10);
  var all = [].concat(ST.orders).sort(function(a,b){return b.createdAt-a.createdAt;});
  var o = all[i];
  if(!o) return;
  if(a==='del'){
    ST.orders = ST.orders.filter(function(x){return x.id!==o.id;});
    saveData(); alert('Pedido de '+o.studentName+' eliminado.'); R();
  } else if(a==='pay'){
    var f = ST.orders.find(function(x){return x.id===o.id;});
    if(f){ f.status='paid'; saveData(); if(f.phone) sendWA(f); R(); }
  } else if(a==='wa'){ sendWA(o); }
});

var _modalCb = null;
function modalPrompt(title, cb){
  var overlay = gel('modal-overlay');
  var titleEl = gel('modal-title');
  var inp = gel('modal-inp');
  var okBtn = gel('modal-ok-btn');
  titleEl.textContent = title;
  inp.value = '';
  overlay.style.display = 'flex';
  inp.focus();
  _modalCb = cb;
  // Reasignar onclick al botón OK cada vez
  okBtn.onclick = function(){
    var val = inp.value.trim();
    if(!val){ inp.focus(); return; }
    overlay.style.display = 'none';
    inp.value = '';
    var fn = _modalCb;
    _modalCb = null;
    if(fn) fn(val);
  };
}
function modalClose(){
  gel('modal-overlay').style.display = 'none';
  gel('modal-inp').value = '';
  _modalCb = null;
}
document.addEventListener('keydown', function(e){
  if(gel('modal-overlay').style.display === 'flex'){
    if(e.key === 'Enter'){ gel('modal-ok-btn').click(); }
    if(e.key === 'Escape'){ modalClose(); }
  }
});

function exportarDatos(){
  var data = {
    schools: ST.schools,
    products: ST.products,
    orders: ST.orders,
    photoMap: ST.photoMap,
    images: ST.images,
    cfg: ST.cfg,
    exportedAt: new Date().toISOString()
  };
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], {type: 'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'datos_photostore.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  alert('Datos exportados: datos_photostore.json');
}

function importarDatos(ev){
  var file = ev.target.files[0];
  if(!file) return;
  ev.target.value = '';
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var data = JSON.parse(e.target.result);
      if(!data.schools && !data.products){
        alert('Archivo invalido. Debe ser un export de PhotoStore.');
        return;
      }
      // Sin confirm() - importar directamente y mostrar resultado
      if(data.schools)  ST.schools  = data.schools;
      if(data.products) ST.products = data.products;
      if(data.orders)   ST.orders   = data.orders;
      if(data.photoMap) ST.photoMap = data.photoMap;
      if(data.images)   ST.images   = data.images;
      if(data.cfg)      ST.cfg      = Object.assign({}, ST.cfg, data.cfg);
      // Limpiar precioBase de colegios sin precio explícito
      ST.schools.forEach(function(sc){
        if(!sc._precioExplicito){ delete sc.precioBase; }
      });
      saveData();
      var totalAlumnos=ST.schools.reduce(function(a,sc){(sc.levels||[]).forEach(function(lv){(lv.grades||[]).forEach(function(gr){a+=(gr.students||[]).length;});});return a;},0);
      alert('Importacion exitosa! Colegios: '+ST.schools.length+' Alumnos: '+totalAlumnos+' Pedidos: '+ST.orders.length);
Colegios: ' + ST.schools.length + '


      R();
    } catch(err){
      alert('Error: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function guardarPrecios(){
  var inputs = document.querySelectorAll('.precio-input');
  if(!inputs || inputs.length === 0){
    alert('No se encontraron campos de precio.');
    return;
  }
  var count = 0;
  // Los inputs aparecen en el mismo orden que ST.products (bases primero, luego extras)
  var bases = ST.products.filter(function(p){return p.isBase;});
  var extras = ST.products.filter(function(p){return !p.isBase;});
  var ordered = bases.concat(extras);
  inputs.forEach(function(inp, i){
    if(ordered[i]){
      var val = parseFloat(inp.value);
      if(!isNaN(val) && val >= 0){
        ordered[i].price = val;
        count++;
      }
    }
  });
  // Limpiar precioBase de colegios sin precio explícito
  ST.schools.forEach(function(sc){
    if(!sc._precioExplicito){
      delete sc.precioBase;
    }
  });
  saveData();
  if(count > 0){
    alert('Guardado! ' + count + ' producto(s) actualizado(s).');
  } else {
    alert('No se encontraron precios para guardar.');
  }
}

document.addEventListener('change', function(e){

    var val = parseFloat(e.target.value);
    if(!isNaN(idx) && !isNaN(val) && val >= 0 && window._PIDS && window._PIDS[idx]){
      var pid = window._PIDS[idx];
      var p = ST.products.find(function(p){ return p.id === pid; });
      if(p){
        p.price = val;
        ST.schools.forEach(function(sc){ if(!sc._precioExplicito) delete sc.precioBase; });
        saveData();
        console.log('Precio guardado:', p.name, val);
      }
    }
  }
});
